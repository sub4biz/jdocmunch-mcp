name: Replay

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  replay:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run all replay-fixture gates
        run: |
          for fixture in self_v1_11_0 markdown_realworld rst_realworld openapi_realworld notebook_realworld; do
            echo "=== ${fixture} ==="
            uv run python -m benchmarks.replay.run_replay \
              --fixture "${fixture}" \
              --baseline 1.21.0 \
              --gate 0.02
          done
        env:
          PYTHONPATH: src:.
